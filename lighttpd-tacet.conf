# Tacet UI: dedicated lighttpd instance on 5050, LAN only
server.document-root = "/opt/share/tacet"
server.bind          = "192.168.1.1"
server.port          = 5050
server.modules       = ( "mod_setenv", "mod_cgi" )
server.pid-file      = "/opt/var/run/lighttpd-tacet.pid"
server.errorlog      = "/opt/var/log/lighttpd-tacet-error.log"
server.upload-dirs   = ( "/tmp" )

index-file.names = ( "index.html" )       # static page shell; data comes from api.cgi
cgi.assign       = ( ".cgi" => "" )         # only .cgi runs; index.html / tacet.css / tacet.js are static
mimetype.assign  = (
    ".html" => "text/html; charset=utf-8",
    ".css"  => "text/css; charset=utf-8",
    ".js"   => "application/javascript; charset=utf-8",
    ".svg"  => "image/svg+xml"
)

# assets carry ETag/Last-Modified; force revalidation so a redeploy is picked up at once
$HTTP["url"] =~ "\.(css|js)$" {
    setenv.add-response-header = ( "Cache-Control" => "no-cache" )
}
